# LINBO Docker - Standalone Network Boot & Imaging Solution
# https://github.com/amolani/linbo-docker

services:
  # =============================================================================
  # Init Container - Downloads boot files on first start
  # =============================================================================
  init:
    build:
      context: ./containers/init
      dockerfile: Dockerfile
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    container_name: linbo-init
    volumes:
      - linbo_srv_data:/srv/linbo
      - linbo_kernel_data:/var/lib/linuxmuster/linbo
      - linbo_driver_data:/var/lib/linbo/drivers
      - ./themes:/opt/linbo-themes:ro
    environment:
      - DEB_BASE_URL=${DEB_BASE_URL:-https://deb.linuxmuster.net}
      - DEB_DIST=${DEB_DIST:-lmn73}
      - LINBO_PKG=${LINBO_PKG:-linuxmuster-linbo7}
      - GUI_PKG=${GUI_PKG:-linuxmuster-linbo-gui7}
      - FORCE_UPDATE=${FORCE_BOOT_UPDATE:-false}
    networks:
      - linbo-net
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M

  # =============================================================================
  # TFTP Server - PXE Boot Files
  # =============================================================================
  tftp:
    build:
      context: ./containers/tftp
      dockerfile: Dockerfile
    container_name: linbo-tftp
    network_mode: host
    volumes:
      - linbo_srv_data:/srv/linbo:ro
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "pgrep", "in.tftpd"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M

  # =============================================================================
  # RSYNC Server - Image Synchronization
  # =============================================================================
  rsync:
    build:
      context: ./containers/rsync
      dockerfile: Dockerfile
    container_name: linbo-rsync
    ports:
      - "873:873"
    volumes:
      - linbo_srv_data:/srv/linbo
      - linbo_driver_data:/var/lib/linbo/drivers:ro
      - ./config/rsyncd.conf:/etc/rsyncd.conf:ro
      - ./config/rsyncd.secrets:/etc/rsyncd.secrets:ro
    environment:
      - API_URL=http://linbo-api:3000/api/v1
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-linbo-internal-secret}
    networks:
      - linbo-net
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "pgrep", "rsync"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 256M

  # =============================================================================
  # SSH Server - Remote Commands to Clients
  # =============================================================================
  ssh:
    build:
      context: ./containers/ssh
      dockerfile: Dockerfile
    container_name: linbo-ssh
    ports:
      - "2222:2222"
    volumes:
      - linbo_srv_data:/srv/linbo
      - linbo_config:/etc/linuxmuster/linbo
      - ./scripts/server:/usr/share/linuxmuster/linbo
      - linbo_log:/var/log/linuxmuster/linbo
      - /root/.ssh/id_rsa:/root/.ssh/id_rsa:ro
      - ./config/ssh_config:/etc/linuxmuster/linbo/ssh_config:ro
    environment:
      - LINBO_SERVER_IP=${LINBO_SERVER_IP:-10.0.0.1}
    networks:
      - linbo-net
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "pgrep", "sshd"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # =============================================================================
  # Redis Cache
  # =============================================================================
  cache:
    # Pinned 2026-03-06 — update periodically
    image: redis:7.4.7-alpine
    container_name: linbo-cache
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - linbo_redis_data:/data
    networks:
      - linbo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M

  # =============================================================================
  # API Backend (Node.js)
  # =============================================================================
  api:
    build:
      context: ./containers/api
      dockerfile: Dockerfile
    container_name: linbo-api
    group_add:
      - "${DOCKER_GID:-988}"
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - linbo_srv_data:/srv/linbo
      - linbo_config:/etc/linuxmuster/linbo
      - ./config/hooks:/etc/linuxmuster/linbo/hooks
      - linbo_log:/var/log/linuxmuster/linbo
      - linbo_kernel_data:/var/lib/linuxmuster/linbo
      - linbo_driver_data:/var/lib/linbo/drivers
      - ./scripts/server:/usr/share/linuxmuster/linbo
      - ./config/rsyncd.secrets:/etc/rsyncd.secrets:ro
      - ./config/rsyncd.secrets:/etc/linuxmuster/linbo/rsyncd.secrets:ro
      - /lib/firmware:/lib/firmware:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Server
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - HOST=0.0.0.0
      # Sync (LMN API — port 8001=linuxmuster-api, 8400=legacy)
      - SYNC_ENABLED=${SYNC_ENABLED:-false}
      - LMN_API_URL=${LMN_API_URL:-https://10.0.0.11:8001}
      - LMN_API_USER=${LMN_API_USER:-}
      - LMN_API_PASSWORD=${LMN_API_PASSWORD:-}
      - LMN_SCHOOL=${LMN_SCHOOL:-default-school}
      - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED:-0}
      # Redis
      - REDIS_HOST=linbo-cache
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      # Authentication
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_here_change_in_production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Muster!}
      # SSH (for linbo-ssh container communication)
      - SSH_HOST=linbo-ssh
      - SSH_PORT=2222
      - SSH_USER=root
      - SSH_PRIVATE_KEY=/etc/linuxmuster/linbo/ssh_host_rsa_key
      - SSH_TIMEOUT=${SSH_TIMEOUT:-10000}
      # SSH (for direct LINBO client connections - terminal, status checks)
      - LINBO_CLIENT_SSH_KEY=/etc/linuxmuster/linbo/linbo_client_key
      - LINBO_CLIENT_SSH_PORT=2222
      # Storage paths
      - LINBO_DATA_DIR=/srv/linbo
      - IMAGES_DIR=/srv/linbo/images
      - LINBO_CONFIG_DIR=/etc/linuxmuster/linbo
      - LINBO_LOG_DIR=/var/log/linuxmuster/linbo
      # Server IP (for clients)
      - LINBO_SERVER_IP=${LINBO_SERVER_IP:-10.0.0.1}
      # DHCP / Network
      - LINBO_SUBNET=${LINBO_SUBNET:-10.0.0.0}
      - LINBO_NETMASK=${LINBO_NETMASK:-255.255.0.0}
      - LINBO_GATEWAY=${LINBO_GATEWAY:-10.0.0.254}
      - LINBO_DNS=${LINBO_DNS:-10.0.0.1}
      - LINBO_DOMAIN=${LINBO_DOMAIN:-linuxmuster.lan}
      # Features
      - ENABLE_AUDIT_LOG=${ENABLE_AUDIT_LOG:-true}
      # Internal API key (container-to-container auth)
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-linbo-internal-secret}
      # HTTP Boot
      - WEB_PORT=${WEB_PORT:-8080}
      # CORS
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      # LINBO Package Source
      - DEB_BASE_URL=${DEB_BASE_URL:-https://deb.linuxmuster.net}
      - DEB_DIST=${DEB_DIST:-lmn73}
      - LINBO_PKG=${LINBO_PKG:-linuxmuster-linbo7}
      # Host Status Worker
      - HOST_OFFLINE_TIMEOUT_SEC=${HOST_OFFLINE_TIMEOUT_SEC:-300}
      - HOST_SCAN_ENABLED=${HOST_SCAN_ENABLED:-true}
      - HOST_SCAN_INTERVAL_SEC=${HOST_SCAN_INTERVAL_SEC:-60}
      - HOST_SCAN_CONCURRENCY=${HOST_SCAN_CONCURRENCY:-30}
      - HOST_SCAN_PORT_TIMEOUT_MS=${HOST_SCAN_PORT_TIMEOUT_MS:-500}
      # Driver management
      - DRIVERS_BASE=${DRIVERS_BASE:-/var/lib/linbo/drivers}
    depends_on:
      cache:
        condition: service_healthy
      ssh:
        condition: service_started
      init:
        condition: service_completed_successfully
    networks:
      - linbo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M

  # =============================================================================
  # Web Frontend (React + Nginx)
  # =============================================================================
  web:
    build:
      context: ./containers/web
      dockerfile: Dockerfile
      args:
        GIT_HASH: ${GIT_HASH:-dev}
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    container_name: linbo-web
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - linbo_srv_data:/srv/linbo:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - linbo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M

  # =============================================================================
  # DHCP Server (ISC DHCP - start with: docker compose --profile dhcp up -d)
  # =============================================================================
  dhcp:
    build: ./containers/dhcp
    container_name: linbo-dhcp
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - linbo_srv_data:/srv/linbo:ro
    environment:
      # Server identity
      - LINBO_SERVER_IP=${LINBO_SERVER_IP:-10.0.0.1}
      - LINBO_HOSTNAME=${LINBO_HOSTNAME:-linbo-docker}
      # LMN Server (for NetBIOS, font-servers)
      - LMN_SERVER_IP=${LMN_SERVER_IP:-${LINBO_SERVER_IP}}
      # Network (served to ALL clients: Windows, Linux, printers, TVs)
      - LINBO_DOMAIN=${LINBO_DOMAIN:-linuxmuster.lan}
      - LINBO_DNS=${LINBO_DNS:-${LMN_SERVER_IP}}
      - LINBO_GATEWAY=${LINBO_GATEWAY:-10.0.0.254}
      # Interface and school
      - DHCP_INTERFACE=${DHCP_INTERFACE:-eth0}
      - LMN_SCHOOL=${LMN_SCHOOL:-default-school}
    profiles: ["dhcp"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M

# =============================================================================
# Volumes
# =============================================================================
volumes:
  linbo_srv_data:
    name: linbo_srv_data
  linbo_config:
    name: linbo_config
  linbo_log:
    name: linbo_log
  linbo_redis_data:
    name: linbo_redis_data
  linbo_kernel_data:
    name: linbo_kernel_data
  linbo_driver_data:
    name: linbo_driver_data

# =============================================================================
# Networks
# =============================================================================
networks:
  linbo-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
